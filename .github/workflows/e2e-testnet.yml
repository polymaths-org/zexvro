# Full production / testnet readiness suite — MANUAL only.
# Does not run on every PR/merge (keeps default CI fast).
#
# Run: GitHub → Actions → "E2E testnet / prod readiness" → Run workflow
#
# Repo secrets (Settings → Secrets → Actions) — never commit values:
#   GATE_ADMIN_API_KEY         required for full Gate admin/agent path
#   COGNITO_SMOKE_USERNAME     preferred for NFT (script fetches a fresh token)
#   COGNITO_SMOKE_PASSWORD
#   NFT_SMOKE_ACCESS_TOKEN     optional short-lived Cognito access token
#   DEPIN_BUYER_SECRET         Stellar secret (testnet USDC buyer) for paid settle
#   NFT_SPONSOR_SECRET         same seed acceptable; used as DEPIN_BUYER fallback
#
# Optional variables:
#   GATE_URL, NFT_URL, DEPIN_URL, CONSOLE_URL, LAND_URL, PLATFORM_API_URL
#   NFT_SMOKE_WORKSPACE_ID, E2E_CHAIN_SMOKE, E2E_PAID_DEPIN
name: E2E testnet / prod readiness

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target label (informational)'
        required: false
        default: 'prod'
        type: choice
        options:
          - prod
          - custom
      chain_smoke:
        description: 'On-chain NFT create/mint/sale (testnet)'
        required: false
        default: true
        type: boolean
      paid_depin:
        description: 'Paid De-pin settle (testnet USDC)'
        required: false
        default: true
        type: boolean

jobs:
  e2e:
    name: Full readiness suite
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Stellar SDK (NFT chain smoke)
        if: ${{ inputs.chain_smoke }}
        run: npm install @stellar/stellar-sdk@16.0.1 --no-save

      - name: Install De-pin deps (paid settle demo client)
        if: ${{ inputs.paid_depin }}
        run: npm --prefix services/depin ci --ignore-scripts

      - name: Run e2e-testnet suite
        env:
          CONSOLE_URL: ${{ vars.CONSOLE_URL }}
          LAND_URL: ${{ vars.LAND_URL }}
          GATE_URL: ${{ vars.GATE_URL }}
          NFT_URL: ${{ vars.NFT_URL }}
          DEPIN_URL: ${{ vars.DEPIN_URL }}
          PLATFORM_API_URL: ${{ vars.PLATFORM_API_URL }}
          DEPIN_PROBE_PATH: ${{ vars.DEPIN_PROBE_PATH }}
          GATE_ADMIN_API_KEY: ${{ secrets.GATE_ADMIN_API_KEY }}
          NFT_SMOKE_ACCESS_TOKEN: ${{ secrets.NFT_SMOKE_ACCESS_TOKEN }}
          COGNITO_SMOKE_USERNAME: ${{ secrets.COGNITO_SMOKE_USERNAME }}
          COGNITO_SMOKE_PASSWORD: ${{ secrets.COGNITO_SMOKE_PASSWORD }}
          COGNITO_USER_POOL_ID: ${{ vars.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ vars.COGNITO_CLIENT_ID }}
          NFT_SMOKE_WORKSPACE_ID: ${{ vars.NFT_SMOKE_WORKSPACE_ID }}
          DEPIN_BUYER_SECRET: ${{ secrets.DEPIN_BUYER_SECRET }}
          NFT_SPONSOR_SECRET: ${{ secrets.NFT_SPONSOR_SECRET }}
          E2E_CHAIN_SMOKE: ${{ inputs.chain_smoke && '1' || '0' }}
          E2E_PAID_DEPIN: ${{ inputs.paid_depin && '1' || '0' }}
          E2E_RETRIES: '8'
          E2E_RETRY_MS: '8000'
          E2E_STABLE_HITS: '2'
          E2E_TIMEOUT_MS: '60000'
        run: node scripts/e2e-testnet.mjs
