<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZEXVRO temporary password</title>
</head>
<body style="margin:0;padding:0;background:#050505;color:#fafafa;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#050505;width:100%;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="width:100%;max-width:560px;background:#0a0a0b;border:1px solid #27272a;border-radius:12px;">
          <tr>
            <td style="padding:28px 32px 22px 32px;border-bottom:1px solid #18181b;" align="center">
              <img src="https://console.zexvro.in/brand/wordmark-transparent.png" width="220" alt="ZEXVRO" style="display:block;margin:0 auto;width:220px;max-width:80%;height:auto;border:0;" />
            </td>
          </tr>
          <tr>
            <td style="padding:28px 32px 8px 32px;" align="left">
              <div style="font-family:Inter,Helvetica,Arial,sans-serif;font-size:10px;font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:#71717a;margin-bottom:10px;">
                Account access
              </div>
              <div style="font-family:Inter,Helvetica,Arial,sans-serif;font-size:22px;font-weight:600;color:#fafafa;margin-bottom:16px;">
                Your temporary password
              </div>
              <p style="margin:0 0 16px 0;font-family:Inter,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.65;color:#a1a1aa;">
                Username: <strong style="color:#fafafa;">{username}</strong>
              </p>
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#09090b;border:1px solid #27272a;border-radius:8px;margin:8px 0 20px 0;">
                <tr>
                  <td align="center" style="padding:22px 16px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:18px;font-weight:600;color:#ffffff;word-break:break-all;">
                    {####}
                  </td>
                </tr>
              </table>
              <p style="margin:0;font-family:Inter,Helvetica,Arial,sans-serif;font-size:13px;line-height:1.6;color:#71717a;">
                Sign in and change this password immediately.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 32px 28px 32px;" align="center">
              <img src="https://console.zexvro.in/brand/logo-transparent.png" width="56" height="56" alt="ZEXVRO" style="display:block;margin:0 auto;width:56px;height:56px;border:0;" />
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
