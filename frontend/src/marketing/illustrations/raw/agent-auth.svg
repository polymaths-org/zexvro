<svg width="640" height="460" viewBox="0 0 640 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="auth-title auth-desc">
  <title id="auth-title">Agent authentication illustration</title>
  <desc id="auth-desc">Scattered identity points resolve into human and agent clusters under an access boundary.</desc>
  <rect x="1" y="1" width="638" height="458" rx="8" fill="#050505" stroke="#27272A" stroke-width="2"/>
  <path id="access-boundary" d="M320 74v312" stroke="#3F3F46" stroke-width="2" stroke-dasharray="8 12"/>
  <g id="human-cluster" opacity=".9">
    <rect x="76" y="88" width="206" height="284" rx="8" fill="#0A0A0B" stroke="#3B82F6" stroke-width="2"/>
    <text x="114" y="342" fill="#A1A1AA" font-family="JetBrains Mono, monospace" font-size="16">HUMAN</text>
  </g>
  <g id="agent-cluster" opacity=".9">
    <rect x="358" y="88" width="206" height="284" rx="8" fill="#0A0A0B" stroke="#22C55E" stroke-width="2"/>
    <text x="408" y="342" fill="#A1A1AA" font-family="JetBrains Mono, monospace" font-size="16">AGENT</text>
  </g>
  <g id="identity-dots" fill="#FAFAFA">
    <circle class="auth-dot human-dot" cx="124" cy="144" r="7"/>
    <circle class="auth-dot human-dot" cx="178" cy="136" r="5"/>
    <circle class="auth-dot human-dot" cx="222" cy="164" r="6"/>
    <circle class="auth-dot human-dot" cx="144" cy="218" r="6"/>
    <circle class="auth-dot human-dot" cx="214" cy="230" r="8"/>
    <circle class="auth-dot human-dot" cx="176" cy="276" r="5"/>
    <circle class="auth-dot agent-dot" cx="412" cy="146" r="6"/>
    <circle class="auth-dot agent-dot" cx="474" cy="142" r="7"/>
    <circle class="auth-dot agent-dot" cx="512" cy="188" r="5"/>
    <circle class="auth-dot agent-dot" cx="426" cy="226" r="7"/>
    <circle class="auth-dot agent-dot" cx="492" cy="246" r="6"/>
    <circle class="auth-dot agent-dot" cx="462" cy="290" r="5"/>
  </g>
  <path id="classification-route" d="M108 402h424" stroke="#FAFAFA" stroke-width="2" stroke-dasharray="9 13"/>
</svg>
