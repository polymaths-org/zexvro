<svg width="640" height="460" viewBox="0 0 640 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="privacy-title privacy-desc">
  <title id="privacy-title">Zero-knowledge privacy pool illustration</title>
  <desc id="privacy-desc">A transaction route enters a shielded pool and exits as a verification mark while details remain hidden.</desc>
  <rect x="1" y="1" width="638" height="458" rx="8" fill="#050505" stroke="#27272A" stroke-width="2"/>
  <g id="grid" opacity=".32" stroke="#27272A" stroke-width="1">
    <path d="M80 0v460M160 0v460M240 0v460M320 0v460M400 0v460M480 0v460M560 0v460"/>
    <path d="M0 76h640M0 152h640M0 228h640M0 304h640M0 380h640"/>
  </g>
  <g id="input-transaction" stroke="#FAFAFA" stroke-width="2" stroke-linecap="square">
    <rect x="54" y="188" width="96" height="84" rx="6" fill="#0A0A0B"/>
    <path d="M78 214h48M78 238h34M78 252h52"/>
    <circle cx="150" cy="230" r="6" fill="#7C3AED"/>
  </g>
  <g id="pool-shell">
    <path d="M320 92l136 52v96c0 78-46 124-136 154-90-30-136-76-136-154v-96l136-52z" fill="#111113" stroke="#FAFAFA" stroke-width="2"/>
    <path id="private-mask" d="M246 166h148v118H246z" fill="#050505" stroke="#3F3F46" stroke-width="2"/>
    <g id="hidden-details" opacity=".18" stroke="#FAFAFA" stroke-width="2">
      <path d="M270 190h100M270 218h72M270 246h112M270 266h64"/>
      <circle cx="382" cy="218" r="7"/>
      <circle cx="382" cy="266" r="7"/>
    </g>
  </g>
  <path id="transaction-route" d="M156 230C202 230 206 162 252 162H320C386 162 406 230 484 230" stroke="#7C3AED" stroke-width="3" stroke-linecap="square" stroke-dasharray="8 12"/>
  <g id="verified-output" transform="translate(492 180)">
    <rect width="96" height="96" rx="6" fill="#0A0A0B" stroke="#FAFAFA" stroke-width="2"/>
    <path id="proof-checkmark-path" d="M27 50l15 16 31-38" stroke="#7C3AED" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter"/>
    <path d="M24 76h52" stroke="#3F3F46" stroke-width="2"/>
  </g>
  <g id="proof-dots" fill="#FAFAFA">
    <circle cx="222" cy="342" r="5"/>
    <circle cx="258" cy="366" r="4"/>
    <circle cx="302" cy="384" r="5"/>
    <circle cx="348" cy="382" r="4"/>
    <circle cx="392" cy="362" r="5"/>
    <circle cx="430" cy="336" r="4"/>
  </g>
</svg>
