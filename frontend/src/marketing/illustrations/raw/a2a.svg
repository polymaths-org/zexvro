<svg width="640" height="460" viewBox="0 0 640 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="a2a-title a2a-desc">
  <title id="a2a-title">A to A trade pipeline illustration</title>
  <desc id="a2a-desc">Two agent nodes exchange offer and counter-offer pulses through a controlled settlement rail.</desc>
  <rect x="1" y="1" width="638" height="458" rx="8" fill="#050505" stroke="#27272A" stroke-width="2"/>
  <g id="agent-a" transform="translate(78 126)">
    <rect width="164" height="164" rx="8" fill="#0A0A0B" stroke="#FAFAFA" stroke-width="2"/>
    <path d="M44 66h76M44 98h46" stroke="#FAFAFA" stroke-width="2"/>
    <rect x="56" y="-24" width="52" height="52" rx="6" fill="#111113" stroke="#FAFAFA" stroke-width="2"/>
    <path d="M82 28v36" stroke="#FAFAFA" stroke-width="2"/>
    <text x="42" y="134" fill="#A1A1AA" font-family="JetBrains Mono, monospace" font-size="16">AGENT A</text>
  </g>
  <g id="agent-b" transform="translate(398 126)">
    <rect width="164" height="164" rx="8" fill="#0A0A0B" stroke="#FAFAFA" stroke-width="2"/>
    <path d="M44 66h76M44 98h46" stroke="#FAFAFA" stroke-width="2"/>
    <rect x="56" y="-24" width="52" height="52" rx="6" fill="#111113" stroke="#FAFAFA" stroke-width="2"/>
    <path d="M82 28v36" stroke="#FAFAFA" stroke-width="2"/>
    <text x="42" y="134" fill="#A1A1AA" font-family="JetBrains Mono, monospace" font-size="16">AGENT B</text>
  </g>
  <path id="offer-path" d="M246 180C306 130 334 130 394 180" stroke="#FAFAFA" stroke-width="2"/>
  <path id="counter-path" d="M394 236C334 286 306 286 246 236" stroke="#FAFAFA" stroke-width="2"/>
  <circle id="offer-pulse" cx="246" cy="180" r="8" fill="#FAFAFA"/>
  <circle id="counter-pulse" cx="394" cy="236" r="8" fill="#A1A1AA"/>
  <g id="settlement-rail" transform="translate(238 322)">
    <rect width="164" height="42" rx="6" fill="#111113" stroke="#3F3F46" stroke-width="2"/>
    <path d="M24 21h116" stroke="#FAFAFA" stroke-width="2" stroke-dasharray="7 9"/>
